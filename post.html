<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết bài viết</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      background:#f4f6f9;
    }

    .container{
      max-width:1000px;
      margin:40px auto;
      padding:20px;
    }

    .back{
      margin-bottom:20px;
      display:inline-block;
      color:#007bff;
      text-decoration:none;
    }

    .card{
      background:#fff;
      padding:30px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      margin-bottom:10px;
    }

    .date{
      color:#888;
      margin-bottom:20px;
    }

    .content{
      font-size:17px;
      color:#333;
      line-height:1.8;
    }

    .content p{
      margin-bottom:14px;
    }

    .main-image{
      width:100%;
      max-height:520px;
      object-fit:cover;
      border-radius:16px;
      margin-top:25px;
    }

    .thumbs{
      display:flex;
      gap:12px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    .thumbs img{
      width:150px;
      height:100px;
      object-fit:cover;
      border-radius:10px;
      cursor:pointer;
      border:2px solid transparent;
    }

    .thumbs img:hover{
      border-color:#007bff;
    }
  </style>
</head>

<body>

<div class="container">
  <a href="index.html" class="back">← Quay lại trang chủ</a>

  <div class="card" id="postDetail">
    Đang tải...
  </div>
</div>

<script>
  const STORAGE_KEY = "customPosts";

  async function loadBasePosts() {
    try {
      const res = await fetch("./posts.json");
      if (!res.ok) return [];
      return await res.json();
    } catch {
      return [];
    }
  }

  function getCustomPosts() {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  }

  async function getAllPosts() {
    const basePosts = await loadBasePosts();
    const customPosts = getCustomPosts();

    const deletedIds = new Set(
      customPosts.filter(p => p._deleted).map(p => String(p.id))
    );

    const map = new Map();

    basePosts.forEach(post => {
      if (!deletedIds.has(String(post.id))) {
        map.set(String(post.id), post);
      }
    });

    customPosts.forEach(post => {
      if (!post._deleted) {
        map.set(String(post.id), post);
      }
    });

    return Array.from(map.values());
  }

  function changeMainImage(src) {
    const img = document.getElementById("mainImage");
    if (img) img.src = src;
  }

  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    if (!id) {
      document.getElementById("postDetail").innerHTML = "Thiếu id bài viết.";
      return;
    }

    try {
      const posts = await getAllPosts();
      const post = posts.find(p => String(p.id) === String(id));

      if (!post) {
        document.getElementById("postDetail").innerHTML = "Không tìm thấy bài viết.";
        return;
      }

      const mainImage = post.image || (post.images && post.images[0]) || "";
      const thumbs = (post.images || [])
        .map(img => `<img src="${img}" alt="${post.title}" onclick="changeMainImage('${img}')">`)
        .join("");

      document.getElementById("postDetail").innerHTML = `
        <h1>${post.title || ""}</h1>
        <div class="date">${post.date || ""}</div>
        <div class="content">${post.content || post.summary || ""}</div>

        ${mainImage ? `
          <div class="main-image-wrap">
            <img id="mainImage" class="main-image" src="${mainImage}" alt="${post.title}">
          </div>
          <div class="thumbs">
            ${thumbs}
          </div>
        ` : ""}
      `;
    } catch (err) {
      document.getElementById("postDetail").innerHTML = "Lỗi tải bài viết.";
      console.error("Load post error:", err);
    }
  }

  loadPost();
</script>
