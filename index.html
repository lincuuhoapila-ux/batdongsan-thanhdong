<!DOCTYPE html>
<html>
<head>
<title>Nhà Đất Hà Nội</title>
<style>
body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#0a6cff;
color:white;
padding:20px;
text-align:center;
}

.menu{
background:#333;
padding:10px;
text-align:center;
}

.menu a{
color:white;
margin:15px;
text-decoration:none;
}

.banner{
background:url('https://images.unsplash.com/photo-1560518883-ce09059eeffa');
height:350px;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
}

.container{
padding:40px;
}

.card{
background:white;
padding:15px;
margin:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
width:300px;
display:inline-block;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:red;
font-weight:bold;
}

footer{
background:#333;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<h1>NHÀ ĐẤT HÀ NỘI</h1>
<p>Mua bán - cho thuê - đầu tư</p>
</header>

<div class="menu">
<a href="#">Trang chủ</a>
<a href="#">Nhà bán</a>
<a href="#">Dự án</a>
<a href="#">Liên hệ</a>
</div>

<div class="banner">
BẤT ĐỘNG SẢN GIÁ TỐT
</div>

<div class="container">

<h2>Bất động sản nổi bật</h2>

<div class="card">
<img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be">
<h3>Nhà phố Cầu Giấy</h3>
<p>Diện tích: 45m2</p>
<p class="price">5.8 tỷ</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1568605114967-8130f3a36994">
<h3>Chung cư Mỹ Đình</h3>
<p>Diện tích: 70m2</p>
<p class="price">3.2 tỷ</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
<h3>Đất nền Đông Anh</h3>
<p>Diện tích: 90m2</p>
<p class="price">2.1 tỷ</p>
</div>

</div>

<footer>
<p>Hotline: 0900000000</p>
<p>Zalo: 0900000000</p>
</footer>

</body>
</html>
